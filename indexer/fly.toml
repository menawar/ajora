app = "ajora-indexer"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "42069"

[http_service]
  internal_port = 42069
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[statics]]
  guest_path = "/app/public"
  url_prefix = "/"

[mounts]
  source = "indexer_data"
  destination = "/data"
