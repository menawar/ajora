name: Indexer uptime

# Watches the deployed indexer (#65): process up + sync lag under 30 minutes.
# No-op until the INDEXER_URL repository variable is set (nothing deployed yet).
# Failures open (or bump) a single issue labeled indexer-down instead of spamming.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Probe indexer
        id: probe
        env:
          INDEXER_URL: ${{ vars.INDEXER_URL }}
        run: |
          if [ -z "$INDEXER_URL" ]; then
            echo "INDEXER_URL not configured; skipping." && echo "state=skip" >> "$GITHUB_OUTPUT" && exit 0
          fi
          fail() { echo "reason=$1" >> "$GITHUB_OUTPUT"; echo "state=down" >> "$GITHUB_OUTPUT"; exit 0; }
          health=$(curl -sf -m 15 -o /dev/null -w "%{http_code}" "$INDEXER_URL/health" || echo 000)
          [ "$health" = "200" ] || fail "health returned $health"
          ts=$(curl -sf -m 15 "$INDEXER_URL/status" | jq -r '[.[].block.timestamp] | min // 0')
          now=$(date +%s)
          lag=$(( now - ts ))
          echo "lag=${lag}s"
          [ "$lag" -lt 1800 ] || fail "sync lag ${lag}s (>30m)"
          echo "state=up" >> "$GITHUB_OUTPUT"

      - name: Alert on failure
        if: steps.probe.outputs.state == 'down'
        env:
          GH_TOKEN: ${{ github.token }}
          REASON: ${{ steps.probe.outputs.reason }}
        run: |
          existing=$(gh issue list -R "$GITHUB_REPOSITORY" --label indexer-down --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" -R "$GITHUB_REPOSITORY" --body "Still down at $(date -u +%FT%TZ): $REASON"
          else
            gh issue create -R "$GITHUB_REPOSITORY" \
              --title "Indexer down: $REASON" \
              --label indexer-down --label area:backend \
              --body "Automated uptime check failed at $(date -u +%FT%TZ). Reason: $REASON. Runbook: indexer/README.md."
          fi
